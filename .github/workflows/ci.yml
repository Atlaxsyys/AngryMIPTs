name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-selfhosted:
    name: Build (self-hosted Linux)
    runs-on: [self-hosted, linux, x64, vps-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          whoami
          hostname
          pwd
          ls -la

      - name: Show tool versions
        run: |
          cmake --version
          g++ --version
          git --version

      - name: Export self-hosted build/runtime paths
        run: |
          echo "CMAKE_PREFIX_PATH=/opt/sfml-3" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/opt/sfml-3/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build-selfhosted \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"

      - name: Build
        run: cmake --build build-selfhosted --parallel 1

      - name: Test
        run: ctest --test-dir build-selfhosted --output-on-failure